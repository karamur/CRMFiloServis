# KOA Filo Servis - Docker Compose
# Kullanım: docker-compose up -d

version: '3.8'

services:
  app:
    image: koafiloservis:latest
    build:
      context: ./app
      dockerfile: ../Dockerfile
    container_name: koafiloservis-app
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=db;Database=koafiloservis;Username=postgres;Password=${POSTGRES_PASSWORD:-KoaFilo2024!}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: koafiloservis-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-KoaFilo2024!}
      - POSTGRES_DB=koafiloservis
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app-data:
  postgres-data:
