# KOA Filo Servis - Docker Compose (Full Stack)

version: '3.8'

services:
  # Ana Uygulama
  app:
    build: ./app
    container_name: koafilo-app
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=db;Database=koafilo;Username=postgres;Password=${POSTGRES_PASSWORD:-KoaFilo2024!}
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD:-Redis2024!}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    restart: unless-stopped
    networks:
      - koafilo-net

  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: koafilo-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-KoaFilo2024!}
      - POSTGRES_DB=koafilo
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - koafilo-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: koafilo-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-Redis2024!}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - koafilo-net

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: koafilo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web-landing:/usr/share/nginx/html/landing:ro
      - ./admin-panel:/usr/share/nginx/html/admin:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - koafilo-net

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: koafilo-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - koafilo-net

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: koafilo-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-Grafana2024!}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - koafilo-net

volumes:
  app-data:
  app-logs:
  db-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  koafilo-net:
    name: koafilo-network
